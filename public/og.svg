  <text x="100" y="300" font-family="'Work Sans','Inter',Arial,sans-serif" font-weight="600" font-size="150" letter-spacing="-4" fill="#f6f1e7">Pole<tspan font-size="95" dy="-52">2</tspan></text>
  <text x="104" y="380" font-family="'Inter',Arial,sans-serif" font-size="40" fill="#f6f1e7" opacity="0.92">Custodisci ciò che conta.</text>
  <text x="104" y="432" font-family="'Inter',Arial,sans-serif" font-size="40" fill="#f6f1e7" opacity="0.92">Conta ciò che custodisci.</text>
